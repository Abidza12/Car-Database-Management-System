<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carinator - Car Database Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #f26203 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Login/Register Screen */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("loginBG.png");
            background-repeat: no-repeat;
            background-size: cover;
        }

        .auth-box {
            background-color: rgba(130, 99, 99, 0.5);
            padding: 30px;
            border-radius: 15px;
            border-style: double;
            border-width: 10px;
            border-color: #213a5e;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .auth-box h1 {
            text-align: center;
            border-radius: 10px;
            padding: 10px;
            color: #dbc3c3;
            margin-bottom: 30px;
            background-size: cover;
            background-color: #000000;
            cursor: pointer;
            transition: background 0.3s;
            transition: padding 0.2s;
        }
        .auth-box h1:hover {
            background-color: #323133;
            padding: 13px;
        }
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            text-align: center;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            transition: padding 0.3s;
        }

        .btn:hover {
            background: #323133;
            padding: 15px;
        }

        .btn-secondary {
            background: #323133;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #484749;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        /* Main App */
        .app-container {
            display: none;
            background-image: url("loginBG.png");
            background-repeat:no-repeat;
            background-size:cover;
            background-attachment: fixed;
        }

        .header {
            background: rgb(171, 160, 160);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #0f1843;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            padding: 8px 20px;
            background: #2d2d2e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .logout-btn:hover {
            padding: 10px 20px;
            background: #505052;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            background: rgb(193, 110, 110, 0.7);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .tab:hover{
            padding: 12px 26px;
        }
        .tab.active {
            background: #4f5366;
            color: white;
        }

        .content {
            background: rgb(193, 110, 110, 0.7);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            min-height: 500px;
        }

        .filters {
            background: rgba(184, 28, 28, 0.7);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .car-card {
            background-color: #727273;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            position: relative;
        }

        .car-card:hover {
            transform: translateY(-5px);
        }

        .car-card h3 {
            color: #030303;
            margin-bottom: 10px;
        }

        .car-info {
            margin-bottom: 10px;
            color: #242424;
        }

        .car-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;;
        }

        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .favorite-btn {
            background: #ccbb58;
            color: #333;
        }

        .favorite-btn.favorited {
            background: #ff6b6b;
            color: white;
        }

        .note-btn {
            background: #4ecdc4;
            color: white;
        }

        .review-btn {
            background: #a696b6;
            color: white;
        }

        .features-list {
            margin-top: 10px;
            padding: 10px;
            background-color: #5f5f60;
            border-radius: 10px;
        }

        .feature-tag {
            display: inline-block;
            background: #60626a;
            color: rgb(0, 0, 0);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 3px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        .note-item, .review-item {
            background: #727273;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .note-item h4, .review-item h4 {
            color: #000000;
            margin-bottom: 10px;
        }

        .note-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .delete-btn {
            background: #ff6b6b;
            color: rgb(0, 0, 0);
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn:hover{
            padding: 5px 17px;
        }
        .edit-btn {
            background: #4ecdc4;
            color: rgb(0, 0, 0);
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .edit-btn:hover{
            padding: 5px 17px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h1>Carinator</h1>
            <div class="error-message" id="authError"></div>
            <div class="success-message" id="authSuccess"></div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <button type="button" class="btn btn-secondary" id="showRegister">Register</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="registerUsername" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <button type="submit" class="btn">Register</button>
                <button type="button" class="btn btn-secondary" id="showLogin">Back to Login</button>
            </form>
        </div>
    </div>

    <!-- Main App Container -->
    <div class="app-container" id="appContainer">
        <div class="container">
            <div class="header">
                <h1>Carinator</h1>
                <div class="user-info">
                    <span id="currentUser"></span>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="explore">Explore</button>
                <button class="tab" data-tab="favorites">Favorites</button>
                <button class="tab" data-tab="notes">My Notes</button>
                <button class="tab" data-tab="reviews">My Reviews</button>
            </div>

            <div class="content">
                <!-- Explore Tab -->
                <div class="tab-content" id="exploreTab">
                    <div class="filters">
                        <div class="filter-section">
                            <h3>Filter by Brand</h3>
                            <div class="checkbox-group" id="brandFilters"></div>
                        </div>
                        <div class="filter-section">
                            <h3>Filter by Features</h3>
                            <div class="checkbox-group" id="featureFilters"></div>
                        </div>
                        <button class="btn" id="applyFilters">Apply Filters</button>
                    </div>
                    <div class="car-grid" id="carGrid"></div>
                </div>

                <!-- Favorites Tab -->
                <div class="tab-content" id="favoritesTab" style="display: none;">
                    <h2>My Favorite Cars</h2>
                    <div class="car-grid" id="favoritesGrid"></div>
                </div>

                <!-- Notes Tab -->
                <div class="tab-content" id="notesTab" style="display: none;">
                    <h2 style="padding-bottom: 10px;">My Notes</h2>
                    <div id="notesList"></div>
                </div>

                <!-- Reviews Tab -->
                <div class="tab-content" id="reviewsTab" style="display: none;">
                    <h2 style="padding-bottom: 10px;">My Reviews</h2>
                    <div id="reviewsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Note</h2>
                <button class="close-modal" onclick="closeNoteModal()">&times;</button>
            </div>
            <textarea id="noteText" placeholder="Enter your note..."></textarea>
            <button class="btn" id="saveNote">Save Note</button>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal" id="reviewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add/Edit Review</h2>
                <button class="close-modal" onclick="closeReviewModal()">&times;</button>
            </div>
            <textarea id="reviewText" placeholder="Enter your review..."></textarea>
            <button class="btn" id="saveReview">Save Review</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://192.168.1.15:5000/api'; //may vary here
        let currentUser = null;
        let currentCarForNote = null;
        let currentCarForReview = null;
        let currentNoteId = null;

        // Auth Functions
        document.getElementById('showRegister').addEventListener('click', () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            clearMessages();
        });

        document.getElementById('showLogin').addEventListener('click', () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            clearMessages();
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await response.json();
                
                if (response.ok) {
                    currentUser = data.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showApp();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Connection error. Make sure the backend is running.');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, email, password})
                });
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Registration successful! Please login.');
                    document.getElementById('showLogin').click();
                    document.getElementById('registerForm').reset();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Connection error. Make sure the backend is running.');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        });

        function showError(message) {
            const errorDiv = document.getElementById('authError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('authSuccess');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 5000);
        }

        function clearMessages() {
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authSuccess').style.display = 'none';
        }

        function showApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('currentUser').textContent = `Welcome - ${currentUser.username}`;
            loadFilters();
            loadCars();
        }

        // Tab Navigation
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
                const tabName = tab.dataset.tab;
                document.getElementById(`${tabName}Tab`).style.display = 'block';

                if (tabName === 'favorites') loadFavorites();
                if (tabName === 'notes') loadNotes();
                if (tabName === 'reviews') loadReviews();
            });
        });

        // Load Filters
        async function loadFilters() {
            try {
                const [brandsRes, featuresRes] = await Promise.all([
                    fetch(`${API_URL}/brands`),
                    fetch(`${API_URL}/features`)
                ]);
                const brands = await brandsRes.json();
                const features = await featuresRes.json();

                const brandFilters = document.getElementById('brandFilters');
                brandFilters.innerHTML = brands.map(brand => `
                    <div class="checkbox-item">
                        <input type="checkbox" id="brand-${brand.brand_id}" value="${brand.brand_id}">
                        <label for="brand-${brand.brand_id}">${brand.brand_name}</label>
                    </div>
                `).join('');

                const featureFilters = document.getElementById('featureFilters');
                featureFilters.innerHTML = features.map(feature => `
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature-${feature.feature_id}" value="${feature.feature_id}">
                        <label for="feature-${feature.feature_id}">${feature.feature_name}</label>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }

        // Load Cars
        async function loadCars(filters = {}) {
            const carGrid = document.getElementById('carGrid');
            carGrid.innerHTML = '<div class="loading">Loading cars...</div>';

            try {
                const queryParams = new URLSearchParams();
                if (filters.brands && filters.brands.length) {
                    queryParams.append('brands', filters.brands.join(','));
                }
                if (filters.features && filters.features.length) {
                    queryParams.append('features', filters.features.join(','));
                }

                const response = await fetch(`${API_URL}/cars?${queryParams}`);
                const cars = await response.json();

                if (cars.length === 0) {
                    carGrid.innerHTML = '<div class="empty-state">No cars found</div>';
                    return;
                }

                const favoritesRes = await fetch(`${API_URL}/favorites/${currentUser.user_id}`);
                const favorites = await favoritesRes.json();
                const favoriteIds = new Set(favorites.map(f => f.car_id));

                carGrid.innerHTML = cars.map(car => createCarCard(car, favoriteIds.has(car.car_id))).join('');
                attachCarActions();
            } catch (error) {
                carGrid.innerHTML = '<div class="empty-state">Error loading cars</div>';
                console.error('Error loading cars:', error);
            }
        }

        document.getElementById('applyFilters').addEventListener('click', () => {
            const selectedBrands = Array.from(document.querySelectorAll('#brandFilters input:checked')).map(cb => cb.value);
            const selectedFeatures = Array.from(document.querySelectorAll('#featureFilters input:checked')).map(cb => cb.value);
            loadCars({ brands: selectedBrands, features: selectedFeatures });
        });

        function createCarCard(car, isFavorited) {
            const features = car.features ? car.features.split(',').map(f => 
                `<span class="feature-tag">${f}</span>`
            ).join('') : '';

            return `
                <div class="car-card">
                    <h3>${car.name}</h3>
                    <div class="car-info"><strong>Brand:</strong> ${car.brand_name}</div>
                    <div class="car-info"><strong>Model:</strong> ${car.model}</div>
                    <div class="car-info"><strong>Year:</strong> ${car.production_date}</div>
                    <div class="car-info"><strong>Country:</strong> ${car.produced_for_country}</div>
                    <div class="car-info">${car.description}</div>
                    ${features ? `<div class="features-list">${features}</div>` : ''}
                    <div class="car-actions">
                        <button class="action-btn favorite-btn ${isFavorited ? 'favorited' : ''}" data-car-id="${car.car_id}">
                            ${isFavorited ? '❤️ Unfavorite' : '🤍 Favorite'}
                        </button>
                        <button class="action-btn note-btn" data-car-id="${car.car_id}" data-car-name="${car.name}">📝 Note</button>
                        <button class="action-btn review-btn" data-car-id="${car.car_id}" data-car-name="${car.name}">⭐ Review</button>
                    </div>
                </div>
            `;
        }

        function attachCarActions() {
            document.querySelectorAll('.favorite-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const carId = e.target.dataset.carId;
                    const isFavorited = e.target.classList.contains('favorited');

                    try {
                        if (isFavorited) {
                            await fetch(`${API_URL}/favorites`, {
                                method: 'DELETE',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({user_id: currentUser.user_id, car_id: carId})
                            });
                            e.target.classList.remove('favorited');
                            e.target.textContent = '🤍 Favorite';
                        } else {
                            await fetch(`${API_URL}/favorites`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({user_id: currentUser.user_id, car_id: carId})
                            });
                            e.target.classList.add('favorited');
                            e.target.textContent = '❤️ Unfavorite';
                        }
                    } catch (error) {
                        console.error('Error toggling favorite:', error);
                    }
                });
            });

            document.querySelectorAll('.note-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentCarForNote = {
                        id: e.target.dataset.carId,
                        name: e.target.dataset.carName
                    };
                    currentNoteId = null;
                    document.getElementById('noteText').value = '';
                    document.getElementById('noteModal').style.display = 'flex';
                });
            });

            document.querySelectorAll('.review-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    currentCarForReview = {
                        id: e.target.dataset.carId,
                        name: e.target.dataset.carName
                    };
                    
                    // Check if review exists
                    try {
                        const response = await fetch(`${API_URL}/reviews/${currentUser.user_id}/${currentCarForReview.id}`);
                        if (response.ok) {
                            const review = await response.json();
                            document.getElementById('reviewText').value = review.review_text;
                        } else {
                            document.getElementById('reviewText').value = '';
                        }
                    } catch (error) {
                        document.getElementById('reviewText').value = '';
                    }
                    
                    document.getElementById('reviewModal').style.display = 'flex';
                });
            });
        }

        // Favorites
        async function loadFavorites() {
            const grid = document.getElementById('favoritesGrid');
            grid.innerHTML = '<div class="loading">Loading favorites...</div>';

            try {
                const response = await fetch(`${API_URL}/favorites/${currentUser.user_id}`);
                const favorites = await response.json();

                if (favorites.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No favorites yet</div>';
                    return;
                }

                grid.innerHTML = favorites.map(car => createCarCard(car, true)).join('');
                attachCarActions();
            } catch (error) {
                grid.innerHTML = '<div class="empty-state">Error loading favorites</div>';
            }
        }

        // Notes
        document.getElementById('saveNote').addEventListener('click', async () => {
            const noteText = document.getElementById('noteText').value;
            if (!noteText.trim()) return;

            try {
                if (currentNoteId) {
                    // Update existing note
                    await fetch(`${API_URL}/notes/${currentNoteId}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({note_text: noteText})
                    });
                } else {
                    // Create new note
                    await fetch(`${API_URL}/notes`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            user_id: currentUser.user_id,
                            car_id: currentCarForNote.id,
                            note_text: noteText
                        })
                    });
                }
                closeNoteModal();
                loadNotes();
            } catch (error) {
                console.error('Error saving note:', error);
            }
        });

        async function loadNotes() {
            const list = document.getElementById('notesList');
            list.innerHTML = '<div class="loading">Loading notes...</div>';

            try {
                const response = await fetch(`${API_URL}/notes/user/${currentUser.user_id}`);
                const notes = await response.json();

                if (notes.length === 0) {
                    list.innerHTML = '<div class="empty-state">No notes yet</div>';
                    return;
                }

                list.innerHTML = notes.map(note => `
                    <div class="note-item">
                        <h4>${note.car_name}</h4>
                        <p>${note.note_text}</p>
                        <div class="note-actions">
                            <button class="edit-btn" onclick="editNote(${note.note_id}, '${note.car_id}', '${note.car_name}', '${note.note_text.replace(/'/g, "\\'")}')">Edit</button>
                            <button class="delete-btn" onclick="deleteNote(${note.note_id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<div class="empty-state">Error loading notes</div>';
            }
        }

        function editNote(noteId, carId, carName, noteText) {
            currentNoteId = noteId;
            currentCarForNote = { id: carId, name: carName };
            document.getElementById('noteText').value = noteText;
            document.getElementById('noteModal').style.display = 'flex';
        }

        async function deleteNote(noteId) {
            if (!confirm('Delete this note?')) return;
            
            try {
                await fetch(`${API_URL}/notes/${noteId}`, { method: 'DELETE' });
                loadNotes();
            } catch (error) {
                console.error('Error deleting note:', error);
            }
        }

        function closeNoteModal() {
            document.getElementById('noteModal').style.display = 'none';
            currentCarForNote = null;
            currentNoteId = null;
        }

        // Reviews
        document.getElementById('saveReview').addEventListener('click', async () => {
            const reviewText = document.getElementById('reviewText').value;
            if (!reviewText.trim()) return;

            try {
                const response = await fetch(`${API_URL}/reviews`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: currentUser.user_id,
                        car_id: currentCarForReview.id,
                        review_text: reviewText
                    })
                });

                if (response.ok) {
                    closeReviewModal();
                    loadReviews();
                }
            } catch (error) {
                console.error('Error saving review:', error);
            }
        });

        async function loadReviews() {
            const list = document.getElementById('reviewsList');
            list.innerHTML = '<div class="loading">Loading reviews...</div>';

            try {
                const response = await fetch(`${API_URL}/reviews/user/${currentUser.user_id}`);
                const reviews = await response.json();

                if (reviews.length === 0) {
                    list.innerHTML = '<div class="empty-state">No reviews yet</div>';
                    return;
                }

                list.innerHTML = reviews.map(review => `
                    <div class="review-item">
                        <h4>${review.car_name}</h4>
                        <p>${review.review_text}</p>
                        <div class="note-actions">
                            <button class="edit-btn" onclick="editReview('${review.car_id}', '${review.car_name}', '${review.review_text.replace(/'/g, "\\'")}')">Edit</button>
                            <button class="delete-btn" onclick="deleteReview(${review.user_id}, ${review.car_id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<div class="empty-state">Error loading reviews</div>';
            }
        }

        function editReview(carId, carName, reviewText) {
            currentCarForReview = { id: carId, name: carName };
            document.getElementById('reviewText').value = reviewText;
            document.getElementById('reviewModal').style.display = 'flex';
        }

        async function deleteReview(userId, carId) {
            if (!confirm('Delete this review?')) return;
            
            try {
                await fetch(`${API_URL}/reviews/${userId}/${carId}`, { method: 'DELETE' });
                loadReviews();
            } catch (error) {
                console.error('Error deleting review:', error);
            }
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
            currentCarForReview = null;
        }

        // Check for existing session
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showApp();
        }
    </script>
</body>
</html>
